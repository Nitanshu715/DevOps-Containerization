name: April 10 FastAPI CI/CD

on:
  push:
    paths:
      - 'April_10/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: |
          echo ${{ secrets.DOCKER_TOKEN }} | docker login -u nitanshutak --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t nitanshutak/fastapi-app:v0.1 ./April_10

      - name: Push Docker Image
        run: |
          docker push nitanshutak/fastapi-app:v0.1
